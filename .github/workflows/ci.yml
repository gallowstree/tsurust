name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # LINT & FORMAT CHECK
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ============================================================
  # SECURITY AUDIT
  # ============================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        # RUSTSEC-2024-0421 (idna): in eframe->webbrowser transitive dep, cannot fix without major eframe upgrade
        run: cargo audit --ignore RUSTSEC-2024-0421

  # ============================================================
  # TESTS
  # ============================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --verbose

  # ============================================================
  # WASM BUILD CHECK
  # ============================================================
  wasm-check:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check WASM build
        run: cargo check --package client-egui --target wasm32-unknown-unknown

  # ============================================================
  # BUILD NATIVE BINARIES (only on main/tags)
  # ============================================================
  build-native:
    name: Build ${{ matrix.target }}
    needs: [lint, test, wasm-check]
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tsurust-linux-x64

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tsurust-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tsurust-macos-arm64

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tsurust-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --bin server --target ${{ matrix.target }}

      - name: Build client
        run: cargo build --release --bin client-egui_bin --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/server dist/
          cp target/${{ matrix.target }}/release/client-egui_bin dist/tsurust-client
          chmod +x dist/*
          tar -czvf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\server.exe dist\
          copy target\${{ matrix.target }}\release\client-egui_bin.exe dist\tsurust-client.exe
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ============================================================
  # BUILD WASM CLIENT (only on main/tags)
  # ============================================================
  build-wasm:
    name: Build WASM
    needs: [lint, test, wasm-check]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build WASM client
        run: |
          cd client-egui
          trunk build --release --public-url /tsurust/

      - name: Inject WebSocket server URL
        if: vars.WS_SERVER_URL != ''
        run: |
          sed -i "s|wsServerUrl: \"ws://127.0.0.1:8080\"|wsServerUrl: \"${{ vars.WS_SERVER_URL }}\"|g" client-egui/dist/index.html

      # Alpha "host-your-own-server" channel, published alongside the root at
      # /tsurust/trial/. Deliberately NOT injected with WS_SERVER_URL: it keeps
      # the localhost default so the client shows its "point me at a server"
      # warning, while real games arrive via ?server=<wss-url> invite links
      # (see host-game.sh / DEPLOYMENT.md → Alpha).
      - name: Build alpha (/trial/) client
        run: |
          cd client-egui
          trunk build --release --public-url /tsurust/trial/ --dist dist-trial
          mkdir -p dist/trial && cp -R dist-trial/. dist/trial/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsurust-wasm
          path: client-egui/dist/

  # ============================================================
  # DEPLOY TO GITHUB PAGES (only on master push)
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [build-wasm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: tsurust-wasm
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # ============================================================
  # BUILD & PUSH DOCKER IMAGES (only on main/tags)
  # ============================================================
  docker:
    name: Docker (${{ matrix.image }})
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: server
            dockerfile: server/Dockerfile
          - image: client
            dockerfile: client-egui/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # CREATE GITHUB RELEASE (only on tags)
  # ============================================================
  release:
    name: Create Release
    needs: [build-native, build-wasm, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
