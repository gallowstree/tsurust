<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsurust - Multiplayer Tsuro Game</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #the_canvas_id {
            width: 100%;
            height: 100%;
        }

        .centered {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        #loading {
            font-size: 1.2em;
        }

        .error {
            color: #ff6b6b;
            padding: 20px;
            max-width: 600px;
            text-align: center;
        }
    </style>
<link rel="modulepreload" href="/tsurust/trial/client-egui_bin-4d3af93091234cbd.js" crossorigin="anonymous" integrity="sha384-5lszPSzdC7S7B/0CcuqtvF+aRrd+1kh+Wwu/Mez7egQVh9GZgU9ZIpkvx3KjGQhr"><link rel="modulepreload" href="/tsurust/trial/snippets/client-egui-9edd77b714be94d8/inline0.js" crossorigin="anonymous" integrity="sha384-O08BBaAoSEnEfpVbDHWa+YnQYkeZGjblpPJhxzFEk2iZdaOAXuVyIFCIUsjKkO97"><link rel="preload" href="/tsurust/trial/client-egui_bin-4d3af93091234cbd_bg.wasm" crossorigin="anonymous" integrity="sha384-S2Yj0KaaD39QAlktyW80CSVGEj4Fz6FobyLc+Pk7JNjwwhv43j8xx4avcAbAzjYa" as="fetch" type="application/wasm"></head>
<body>
    <div id="loading" class="centered">
        <div>
            <h2>Loading Tsurust...</h2>
            <p>Initializing WebAssembly module</p>
        </div>
    </div>

    <canvas id="the_canvas_id"></canvas>

    <!-- Load environment-specific configuration -->
    <script>
        // WebSocket server URL. Defaults to localhost for local dev; the CI
        // Pages deploy rewrites this line in the built dist/index.html using the
        // WS_SERVER_URL repo variable (see .github/workflows/ci.yml).
        window.TSURUST_CONFIG = window.TSURUST_CONFIG || {
            wsServerUrl: "ws://127.0.0.1:8080"
        };
    </script>

    <!-- Trunk will compile Rust to WASM and inject loading code here -->
    
<script type="module">
import init, * as bindings from '/tsurust/trial/client-egui_bin-4d3af93091234cbd.js';
const wasm = await init({ module_or_path: '/tsurust/trial/client-egui_bin-4d3af93091234cbd_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    <!-- The canvas ID 'the_canvas_id' is used by eframe automatically -->
</body>
</html>
